name: ncae-lab

x-topology-env: &topology-env
  TEAM: "1"
  NCAE_LAN: "10.88.1.0/24"
  NCAE_LAN_BASE: "10.88.1"
  NCAE_SCORING: "10.77.0.0/16"
  NCAE_SHELL_IP: "10.77.14.1"
  NCAE_BACKUP_IP: "10.88.1.15"
  NCAE_CA_IP: "10.77.0.38"

x-common: &common
  privileged: true
  cgroup: host
  stdin_open: true
  tty: true
  tmpfs:
    - /run
    - /run/lock
    - /tmp
  volumes:
    - ../../:/opt/ncae
    - ./logs:/vagrant/logs
    - /sys/fs/cgroup:/sys/fs/cgroup
  environment:
    <<: *topology-env
    NCAE_AUTO_ACCEPT: "1"
    NCAE_SKIP_BACKUP: "1"
    NCAE_SKIP_SCRIPT_LOCK: "1"

services:
  router:
    <<: *common
    build:
      context: ../..
      dockerfile: docker/lab/ubuntu-systemd.Dockerfile
    hostname: router
    container_name: ncae-router
    command: ["/sbin/init"]
    networks:
      ncae_external:
        ipv4_address: 10.77.13.1
      ncae_internal:
        ipv4_address: 10.88.1.254

  scoring:
    <<: *common
    build:
      context: ../..
      dockerfile: docker/lab/ubuntu-systemd.Dockerfile
    hostname: scoring
    container_name: ncae-scoring
    command: ["/sbin/init"]
    networks:
      ncae_external:
        ipv4_address: 10.77.0.38

  shell:
    <<: *common
    build:
      context: ../..
      dockerfile: docker/lab/rocky-systemd.Dockerfile
    hostname: shell
    container_name: ncae-shell
    command: ["/sbin/init"]
    environment:
      <<: *topology-env
      NCAE_AUTO_ACCEPT: "1"
      NCAE_SKIP_BACKUP: "1"
      NCAE_SKIP_SCRIPT_LOCK: "1"
      NCAE_SKIP_UPDATE: "1"
      NCAE_SKIP_INSTALL: "1"
      NCAE_SCORING_PASS: "LabShell123!A"
    networks:
      ncae_external:
        ipv4_address: 10.77.14.1

  www:
    <<: *common
    build:
      context: ../..
      dockerfile: docker/lab/ubuntu-systemd.Dockerfile
    hostname: www
    container_name: ncae-www
    command: ["/sbin/init"]
    environment:
      <<: *topology-env
      NCAE_AUTO_ACCEPT: "1"
      NCAE_SKIP_BACKUP: "1"
      NCAE_SKIP_SCRIPT_LOCK: "1"
      NCAE_SKIP_UPDATE: "1"
      NCAE_SKIP_INSTALL: "1"
    networks:
      ncae_internal:
        ipv4_address: 10.88.1.5

  db:
    <<: *common
    build:
      context: ../..
      dockerfile: docker/lab/ubuntu-systemd.Dockerfile
    hostname: db
    container_name: ncae-db
    command: ["/sbin/init"]
    environment:
      <<: *topology-env
      NCAE_AUTO_ACCEPT: "1"
      NCAE_SKIP_BACKUP: "1"
      NCAE_SKIP_SCRIPT_LOCK: "1"
      NCAE_SKIP_UPDATE: "1"
      NCAE_SKIP_INSTALL: "1"
      NCAE_DB_PASS: "LabDb123!A"
    networks:
      ncae_internal:
        ipv4_address: 10.88.1.7

  dns:
    <<: *common
    build:
      context: ../..
      dockerfile: docker/lab/rocky-systemd.Dockerfile
    hostname: dns
    container_name: ncae-dns
    command: ["/sbin/init"]
    environment:
      <<: *topology-env
      NCAE_AUTO_ACCEPT: "1"
      NCAE_SKIP_BACKUP: "1"
      NCAE_SKIP_SCRIPT_LOCK: "1"
      NCAE_SKIP_UPDATE: "1"
      NCAE_SKIP_INSTALL: "1"
    networks:
      ncae_internal:
        ipv4_address: 10.88.1.12

  backup:
    <<: *common
    build:
      context: ../..
      dockerfile: docker/lab/ubuntu-systemd.Dockerfile
    hostname: backup
    container_name: ncae-backup
    command: ["/sbin/init"]
    environment:
      <<: *topology-env
      NCAE_AUTO_ACCEPT: "1"
      NCAE_SKIP_BACKUP: "1"
      NCAE_SKIP_SCRIPT_LOCK: "1"
      NCAE_SKIP_UPDATE: "1"
      NCAE_SKIP_INSTALL: "1"
    networks:
      ncae_internal:
        ipv4_address: 10.88.1.15

networks:
  ncae_external:
    driver: bridge
    ipam:
      config:
        - subnet: 10.77.0.0/16
  ncae_internal:
    driver: bridge
    ipam:
      config:
        - subnet: 10.88.1.0/24
